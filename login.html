<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Inventory Agent</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="css/styles.css" rel="stylesheet">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .login-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%);
            z-index: -1;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-bg"></div>
        <div class="login-card glass-panel text-center">
            <!-- Theme Toggle -->
            <div class="text-end mb-3">
                <a href="#" id="theme-toggle-btn" class="theme-toggle" title="Toggle Theme">
                    <i id="theme-icon" class="bi bi-sun-fill"></i>
                </a>
            </div>

            <!-- Brand Logo -->
            <div class="mb-4">
                <div class="stat-icon primary mx-auto mb-3" style="width: 60px; height: 60px; font-size: 2rem;">
                    <i class="bi bi-cpu-fill"></i>
                </div>
                <h2>AI Inventory Agent</h2>
                <p class="text-secondary">Manufacturing Operations Portal</p>
            </div>

            <!-- Error Banner -->
            <div id="error-banner" class="alert alert-danger d-none" role="alert">
                Invalid credentials. Please try again.
            </div>

            <!-- Login Form -->
            <form id="login-form" novalidate>
                <div class="mb-3 text-start">
                    <label for="username" class="form-label text-secondary">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control border-start-0" id="username" placeholder="Enter username" required>
                        <div class="invalid-feedback">Username is required</div>
                    </div>
                </div>

                <div class="mb-4 text-start">
                    <label for="password" class="form-label text-secondary">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-end-0 text-muted"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control border-start-0" id="password" placeholder="Enter password" required>
                        <div class="invalid-feedback">Password is required</div>
                    </div>
                </div>

                <button type="submit" class="btn btn-indigo w-100 py-2.5 fw-bold" style="background-color: var(--accent-primary); color: white; border: none; border-radius: 8px;">
                    Sign In
                </button>
            </form>

            <div class="mt-4">
                <small class="text-muted">Use default developer credentials: <br><strong>admin</strong> / <strong>admin123</strong></small>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Theme/Session App JS -->
    <script src="js/app.js"></script>

    <script>
        // Check if there is an active session, but skip automatic redirection to avoid loops.
        // We override checkSession on login page: if success -> go to dashboard.
        
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            e.stopPropagation();

            const form = this;
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const errorBanner = document.getElementById('error-banner');

            // Reset banner
            errorBanner.classList.add('d-none');

            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return;
            }

            // Perform REST Call
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: usernameInput.value,
                        password: passwordInput.value
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    showToast('Login successful! Redirecting...', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    errorBanner.textContent = data.message || 'Invalid username or password';
                    errorBanner.classList.remove('d-none');
                    showToast('Authentication failed', 'danger');
                }
            } catch (err) {
                console.error('Login error:', err);
                errorBanner.textContent = 'Server connection failed. Is Spring Boot running?';
                errorBanner.classList.remove('d-none');
                showToast('Server unavailable', 'danger');
            }
        });
    </script>
</body>
</html>
